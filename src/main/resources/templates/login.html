<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pouso-Login</title>
        <link
            href="https://cdn.jsdelivr.net/npm/beercss@4.0.21/dist/cdn/beer.min.css"
            rel="stylesheet"
        />
        <script
            type="module"
            src="https://cdn.jsdelivr.net/npm/beercss@4.0.21/dist/cdn/beer.min.js"
        ></script>
        <script
            type="module"
            src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.4/dist/cdn/material-dynamic-colors.min.js"
        ></script>
        <style>
            .login-container {
                min-height: 100vh;
                padding: 0;
                margin: 0;
            }
            .left-banner {
                background-image: url("/img/quadro.png");
                background-size: cover;
                background-position: center;
                min-height: 100vh;
            }
            .right-form {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 3rem;
                min-height: 100vh;
                background-color: var(--surface, #ffffff);
            }
            .brand-logo {
                max-width: 180px;
                margin-bottom: 2rem;
            }
            .form-box {
                width: 100%;
                max-width: 360px;
            }
            .error-message {
                color: var(--error, #b00020);
                margin-bottom: 1rem;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <main class="grid login-container no-space">
            <div class="s12 m6 l6 left-banner none m l"></div>

            <div class="s12 m6 l6 right-form">
                <div class="form-box center-align">
                    <img
                        src="/img/logo.png"
                        alt="Logo Pouso"
                        class="brand-logo"
                    />

                    <div th:if="${error}" class="error-message">
                        <p th:text="${error}"></p>
                    </div>

                    <form
                        th:action="@{/login}"
                        method="POST"
                        autocomplete="off"
                    >
                        <div class="field label border extra">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                            />
                            <label for="email">Email</label>
                        </div>

                        <div class="field label border extra">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                            />
                            <label for="password">Senha</label>
                        </div>

                        <div class="row padding center-align no-space">
                            <a th:href="@{/home}" class="button border round"
                                >Voltar</a
                            >
                            <div class="max"></div>
                            <button type="submit">Entrar</button>
                        </div>

                        <div class="margin top medium center-align">
                            <span class="grey-text"
                                >Ainda não tem uma conta?</span
                            >
                            <br />
                            <a th:href="@{/register}" class="link"
                                ><strong>Registre-se!</strong></a
                            >
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
